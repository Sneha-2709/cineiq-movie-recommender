version: "3.8"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  mlflow:
    build: .
    command: mlflow ui --backend-store-uri mlflow_runs/ --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - .:/app
